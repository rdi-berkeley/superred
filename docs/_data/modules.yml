# Catalogue of available modules, rendered on /modules.
# repo: the module's folder in the RoldSI/superred-modules repository. The tile
#       links to that folder's README, which is the module's documentation:
#       parameters, deviations from the paper, and caveats.
# pip:  the published PyPI package name. Omit it for a module that is not on
#       PyPI yet, and the tile shows no install command.
# pending: the module is pending publishing, so it has neither a package nor a
#          README to link to yet.
# emoji: a distinctive glyph evoking the technique.
# suit: which target classes it fits (chatbot / agentic / assistant); a list.
# first_party: an original module by its own authors (otherwise it is a
#              community port of someone else's published work).
# paper: canonical publication (arXiv abstract page where one exists).
# hf:    HuggingFace dataset page (benchmarks only).
optimizers:
  - { name: PAIR,               repo: optimizers/pair,             pip: superred-optimizer-pair,             emoji: "🔁", suit: [chatbot], blurb: "Iterative prompt refinement with an attacker LLM", paper: "https://arxiv.org/abs/2310.08419" }
  - { name: TAP,                repo: optimizers/tap,              pending: true,                                emoji: "🌳", suit: [chatbot], blurb: "Tree-of-attacks with pruning", paper: "https://arxiv.org/abs/2312.02119" }
  - { name: AutoDAN-Turbo,      repo: optimizers/autodan_turbo,    pip: superred-optimizer-autodan-turbo,    emoji: "📚", suit: [chatbot], blurb: "Lifelong strategy-discovery jailbreak", paper: "https://arxiv.org/abs/2410.05295" }
  - { name: Crescendo,          repo: optimizers/crescendo,        pip: superred-optimizer-crescendo,        emoji: "📈", suit: [chatbot], blurb: "Gradual multi-turn escalation", paper: "https://arxiv.org/abs/2404.01833" }
  - { name: GPTFuzzer,          repo: optimizers/gptfuzzer,        pending: true,                                emoji: "🎲", suit: [chatbot], blurb: "Mutation-based jailbreak fuzzing", paper: "https://arxiv.org/abs/2309.10253" }
  - { name: Many-Shot,          repo: optimizers/many_shot,        pending: true,                                emoji: "🗂️", suit: [chatbot], blurb: "Many in-context demonstrations", paper: "https://www.anthropic.com/research/many-shot-jailbreaking" }
  - { name: GOAT,               repo: optimizers/goat,             pip: superred-optimizer-goat,             emoji: "🐐", suit: [chatbot], blurb: "Generative offensive agent tester (multi-turn)", paper: "https://arxiv.org/abs/2410.01606" }
  - { name: FlipAttack,         repo: optimizers/flip_attack,      pending: true,                                emoji: "🔃", suit: [chatbot], blurb: "Single-turn flip-based obfuscation", paper: "https://arxiv.org/abs/2410.02832" }
  - { name: CodeChameleon,      repo: optimizers/code_chameleon,   pending: true,                                emoji: "🦎", suit: [chatbot], blurb: "Code-encryption obfuscation jailbreak", paper: "https://arxiv.org/abs/2402.16717" }
  - { name: DRA,                repo: optimizers/dra,              pending: true,                                emoji: "🎭", suit: [chatbot], blurb: "Disguise-and-reconstruction attack", paper: "https://arxiv.org/abs/2402.18104" }
  - { name: Bijection Learning, repo: optimizers/bijection,        pip: superred-optimizer-bijection,        emoji: "🔤", suit: [chatbot], blurb: "Bijection-cipher jailbreak", paper: "https://arxiv.org/abs/2410.01294" }
  - { name: FITD,               repo: optimizers/fitd,             pending: true,                                emoji: "🚪", suit: [chatbot], blurb: "Foot-in-the-door multi-turn escalation", paper: "https://arxiv.org/abs/2502.19820" }
  - { name: GEPA,               repo: optimizers/gepa,             pip: superred-optimizer-gepa,             emoji: "🪞", suit: [chatbot], blurb: "Reflective prompt evolution", paper: "https://arxiv.org/abs/2507.19457" }
  - { name: GEPA (agentic),     repo: optimizers/gepa_agentic,     pip: superred-optimizer-gepa-agentic,     emoji: "🧬", suit: [agentic, assistant], blurb: "Reflective prompt evolution for agent targets", paper: "https://arxiv.org/abs/2507.19457" }
