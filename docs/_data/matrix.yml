# Data behind the capability matrix on the landing page (Why SuperRed).
# Rows are optimizers, columns are targets, and each cell carries the security
# claims that score that pairing. Imported from the Claude Design "Matrix
# Diagram": the grid is deliberately larger than its frame and fades out, so it
# only ever needs enough rows and columns to run past the fade.
# Column order is the render order, left to right.
targets:
  - { name: OpenClaw,           claims: [DecodingTrust, SafeClawBench] }
  - { name: Chatbot,            claims: [HarmBench, StrongREJECT, SORRY-Bench] }
  - { name: Claude Code,        claims: [DecodingTrust] }
  - { name: OpenClaw with DecodingTrust, claims: [DecodingTrust, SafeClawBench] }
  - { name: AgentDojo,          claims: [AgentHarm, AgentDojo, ASB] }
  - { name: Inspect agent,      claims: [AgentHarm, AgentDojo, ASB] }

optimizers:
  - Goal passthrough
  - AutoDAN-Turbo
  - Crescendo
  - AgentVigil
  - MUZZLE
  - PAIR
  - TAP
  - MINJA
  - PoisonedRAG
  - GPTFuzzer
  - EIA
  - GOAT
  - FlipAttack
  - DRA
  - CodeChameleon
