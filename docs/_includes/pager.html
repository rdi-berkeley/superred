{% if prev or nxt %}
<nav class="pager {{ include.cls }}">
  {% if prev %}<a class="pager-prev" href="{{ prev.url | relative_url }}">&larr; {{ prev.title }}</a>{% endif %}
  {% if nxt %}<a class="pager-next" href="{{ nxt.url | relative_url }}">{{ nxt.title }} &rarr;</a>{% endif %}
</nav>
{% endif %}
