<div class="dc-figure">
<figure data-screen-label="U2 target surfaces" style="margin:0;box-sizing:border-box;max-width:940px;width:100%;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:22px 24px 18px;font-family:var(--font-serif);color:var(--ink);">

  <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;">a target&rsquo;s surfaces &middot; who uses each, and when</div>

  <div style="position:relative;width:100%;aspect-ratio:1120 / 470;">

    <svg viewBox="0 0 1120 470" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;">
      <defs>
        <marker id="u2a" markerWidth="9" markerHeight="9" refX="7" refY="4.3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4.3 L0,8.6 Z" fill="#111111"></path></marker>
      </defs>
      <g stroke="#111111" stroke-width="1.4" fill="none" vector-effect="non-scaling-stroke">
        <line x1="560" y1="66" x2="560" y2="114" marker-end="url(#u2a)"></line>
        <line x1="412" y1="170" x2="234" y2="150" marker-end="url(#u2a)"></line>
        <line x1="412" y1="258" x2="234" y2="278" marker-end="url(#u2a)"></line>
        <line x1="708" y1="212" x2="892" y2="212" marker-end="url(#u2a)"></line>
      </g>
    </svg>

    <!-- Task actor -->
    <div style="position:absolute;left:40%;top:1%;width:20%;height:13%;box-sizing:border-box;border:1px solid var(--line);border-left:3px solid #6b7a99;border-radius:6px;background:var(--paper);display:flex;align-items:center;justify-content:center;gap:8px;">
      <span style="width:7px;height:7px;border-radius:999px;background:#6b7a99;flex:none;"></span>
      <span style="font-size:14px;font-weight:500;">Task</span>
    </div>

    <!-- Optimizer actor -->
    <div style="position:absolute;left:1.5%;top:30%;width:19.5%;height:34%;box-sizing:border-box;border:1px solid var(--line);border-left:3px solid #8a7099;border-radius:6px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
      <span style="display:inline-flex;align-items:center;gap:8px;"><span style="width:7px;height:7px;border-radius:999px;background:#8a7099;flex:none;"></span><span style="font-size:14px;font-weight:500;">Optimizer</span></span>
      <span style="font-size:10.5px;color:var(--gray);text-align:center;line-height:1.3;">the attacker</span>
    </div>

    <!-- Evaluator actor -->
    <div style="position:absolute;left:80%;top:33%;width:18.5%;height:28%;box-sizing:border-box;border:1px solid var(--line);border-left:3px solid #9c8250;border-radius:6px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
      <span style="display:inline-flex;align-items:center;gap:8px;"><span style="width:7px;height:7px;border-radius:999px;background:#9c8250;flex:none;"></span><span style="font-size:14px;font-weight:500;">evaluator</span></span>
      <span style="font-size:10.5px;color:var(--gray);text-align:center;line-height:1.3;"><span style="font-family:var(--font-mono);font-size:10px;">task.evaluate()</span></span>
    </div>

    <!-- Target box -->
    <div style="position:absolute;left:37%;top:25%;width:26%;height:42%;box-sizing:border-box;border:1px solid var(--ink);border-radius:10px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;">
      <span style="font-size:19px;font-weight:500;line-height:1;">Target</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--gray-33);">run(emit, send_event)</span>
    </div>
    <!-- security_domain tag on the base -->
    <div style="position:absolute;left:50%;top:67%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--code-bg);border:1px solid var(--line);border-radius:999px;padding:3px 12px;white-space:nowrap;">
      <span style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);">security_domain</span>
    </div>
    <div style="position:absolute;left:50%;top:73.5%;transform:translate(-50%,-50%);font-size:10px;color:var(--gray);white-space:nowrap;">the forest that tags every surface</div>

    <!-- labels -->
    <div style="position:absolute;left:53%;top:14.5%;width:40%;">
      <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);line-height:1.3;">config_specs / set_config(name, value)</div>
      <div style="font-size:10px;color:var(--gray);font-style:italic;">before the run loop</div>
    </div>
    <div style="position:absolute;left:22%;top:24%;width:26%;text-align:left;">
      <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);line-height:1.3;">get_observables()</div>
      <div style="font-size:10px;color:var(--gray);font-style:italic;">static facts, read at initialize()</div>
    </div>
    <div style="position:absolute;left:22%;top:64%;width:26%;text-align:left;">
      <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);line-height:1.3;">get_controllables()</div>
      <div style="font-size:10px;color:var(--gray);font-style:italic;">injection points, during the run</div>
    </div>
    <div style="position:absolute;left:64%;top:25%;width:34%;text-align:left;">
      <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);line-height:1.3;">query_specs / query(name, **params)</div>
      <div style="font-size:10px;color:var(--gray);font-style:italic;">after the run</div>
    </div>

  </div>

  <!-- phase strip -->
  <div style="margin-top:12px;padding-top:14px;border-top:1px solid var(--line);">
    <div style="font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray);margin-bottom:10px;">lifecycle of one target instance</div>
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--ink);">
      <span style="border:1px solid var(--line);border-radius:5px;padding:5px 10px;">construct</span>
      <span style="color:var(--gray);">&rarr;</span>
      <span style="border:1px solid var(--line);border-radius:5px;padding:5px 10px;">configure_target()</span>
      <span style="color:var(--gray);">&rarr;</span>
      <span style="position:relative;display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--gray);border-radius:6px;padding:9px 12px 5px;">
        <span style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--paper);padding:0 6px;font-family:var(--font-serif);font-style:italic;font-size:10px;color:var(--gray);white-space:nowrap;">&times;N runs</span>
        <span style="border:1px solid var(--line);border-radius:5px;padding:4px 9px;background:var(--paper);">run()</span>
        <span style="color:var(--gray);">&rarr;</span>
        <span style="border:1px solid var(--line);border-radius:5px;padding:4px 9px;background:var(--paper);">evaluate()</span>
        <span style="color:var(--gray);">&rarr;</span>
        <span style="border:1px solid var(--line);border-radius:5px;padding:4px 9px;background:var(--paper);">reset_ephemeral_state()</span>
      </span>
      <span style="color:var(--gray);">&rarr;</span>
      <span style="border:1px solid var(--line);border-radius:5px;padding:5px 10px;">teardown()</span>
    </div>
  </div>

</figure>
</div>
