<div class="dc-figure">
<figure data-screen-label="U8 parallel branches" style="margin:0;box-sizing:border-box;max-width:980px;width:100%;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:22px 24px 18px;font-family:var(--font-serif);color:var(--ink);">

  <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;">parallel branches inside one run</div>

  <div style="position:relative;width:100%;aspect-ratio:1160 / 420;">

    <svg viewBox="0 0 1160 420" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;">
      <defs>
        <marker id="u8a" markerWidth="9" markerHeight="9" refX="7" refY="4.3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4.3 L0,8.6 Z" fill="#111111"></path></marker>
        <marker id="u8s" markerWidth="8" markerHeight="8" refX="1.2" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M8,0 L0.5,4 L8,8 Z" fill="#808080"></path></marker>
        <marker id="u8e" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7.5,4 L0,8 Z" fill="#808080"></path></marker>
      </defs>
      <g fill="none" vector-effect="non-scaling-stroke">
        <!-- fork -->
        <path d="M162,205 C 198,205 200,150 232,150" stroke="#111111" stroke-width="1.5" marker-end="url(#u8a)"></path>
        <path d="M162,225 C 198,225 200,306 232,306" stroke="#111111" stroke-width="1.5" marker-end="url(#u8a)"></path>
        <!-- branch <-> optimizer -->
        <line x1="432" y1="178" x2="520" y2="200" stroke="#808080" stroke-width="1.3" stroke-dasharray="5 4" marker-start="url(#u8s)" marker-end="url(#u8e)"></line>
        <line x1="432" y1="282" x2="520" y2="240" stroke="#808080" stroke-width="1.3" stroke-dasharray="5 4" marker-start="url(#u8s)" marker-end="url(#u8e)"></line>
        <!-- resume + join -->
        <path d="M432,138 C 690,104 700,150 852,186" stroke="#111111" stroke-width="1.5" marker-end="url(#u8a)"></path>
        <path d="M432,320 C 690,356 700,300 852,262" stroke="#111111" stroke-width="1.5" marker-end="url(#u8a)"></path>
      </g>
    </svg>

    <!-- Target.run() -->
    <div style="position:absolute;left:0.9%;top:41%;width:13%;height:26%;box-sizing:border-box;border:1px solid var(--ink);border-radius:6px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 6px;text-align:center;">
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink);">Target.run()</span>
      <span style="font-size:9px;color:var(--gray);font-style:italic;line-height:1.2;">forks via<br>asyncio.gather</span>
    </div>

    <!-- Branch A -->
    <div style="position:absolute;left:17%;top:26.5%;width:20.2%;height:22%;box-sizing:border-box;border:1px dashed var(--gray);border-radius:6px;background:var(--code-bg);padding:8px 11px;display:flex;flex-direction:column;justify-content:center;gap:2px;">
      <span style="display:flex;align-items:center;justify-content:space-between;gap:6px;"><span style="font-size:11.5px;font-weight:500;">Branch A</span><span style="font-size:8px;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray);">suspended</span></span>
      <span style="font-family:var(--font-mono);font-size:8px;color:var(--gray-33);line-height:1.3;">send_event(<br>ControllablePreCallEvent)</span>
      <span style="font-family:var(--font-mono);font-size:8.5px;color:var(--ink);">controllable=_SEARCH_CTRL</span>
    </div>

    <!-- Branch B -->
    <div style="position:absolute;left:17%;top:64.5%;width:20.2%;height:22%;box-sizing:border-box;border:1px dashed var(--gray);border-radius:6px;background:var(--code-bg);padding:8px 11px;display:flex;flex-direction:column;justify-content:center;gap:2px;">
      <span style="display:flex;align-items:center;justify-content:space-between;gap:6px;"><span style="font-size:11.5px;font-weight:500;">Branch B</span><span style="font-size:8px;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray);">suspended</span></span>
      <span style="font-family:var(--font-mono);font-size:8px;color:var(--gray-33);line-height:1.3;">send_event(<br>ControllablePreCallEvent)</span>
      <span style="font-family:var(--font-mono);font-size:8.5px;color:var(--ink);">controllable=_GEN_CTRL</span>
    </div>

    <!-- Optimizer -->
    <div style="position:absolute;left:45%;top:42%;width:15%;height:20%;box-sizing:border-box;border:1px solid var(--ink);border-radius:6px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
      <span style="font-size:13px;font-weight:500;">Optimizer</span>
      <span style="font-size:9px;color:var(--gray);font-style:italic;text-align:center;line-height:1.25;">sequential &middot; answers<br>one after another</span>
    </div>

    <!-- labels -->
    <div style="position:absolute;left:41%;top:53%;transform:translate(-50%,-50%);text-align:center;font-family:var(--font-mono);font-size:8px;color:var(--gray);line-height:1.3;background:var(--paper);padding:1px 3px;">send_event<br>&#8644; injection</div>
    <div style="position:absolute;left:64.5%;top:27.5%;transform:translate(-50%,-50%);font-size:9.5px;font-style:italic;color:var(--gray);white-space:nowrap;background:var(--paper);padding:0 4px;">resume &amp; join</div>

    <!-- gather / combine -->
    <div style="position:absolute;left:73.5%;top:33%;width:25%;height:42%;box-sizing:border-box;border:1px solid var(--ink);border-radius:6px;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:0 12px;text-align:center;">
      <span style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);line-height:1.35;">await asyncio.gather(A, B)</span>
      <span style="font-size:11px;color:var(--gray);">&darr;</span>
      <span style="font-family:var(--font-mono);font-size:10.5px;color:var(--ink);">self._combine(a, b)</span>
    </div>

  </div>

  <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;line-height:1.5;color:var(--gray);text-wrap:pretty;">Each <span style="font-family:var(--font-mono);font-size:10.5px;">send_event</span> suspends only its own branch; the default sequential optimizer answers them one after another; the channel is thread-safe (<span style="font-family:var(--font-mono);font-size:10.5px;">call_soon_threadsafe</span>).</div>

</figure>
</div>
