<div class="dc-figure">
<figure data-screen-label="D4 filtered trajectory" style="margin:0;box-sizing:border-box;max-width:880px;width:100%;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:26px 28px 22px;font-family:var(--font-serif);color:var(--ink);">

  <div style="display:flex;align-items:stretch;gap:0;">

    <!-- Trajectory (full) -->
    <div style="flex:1;box-sizing:border-box;border:1px solid var(--ink);border-radius:6px;padding:14px 15px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px;">
        <span style="font-size:14px;font-weight:500;">Trajectory</span>
        <span style="font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray);">full record</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ObservableEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;">system_prompt</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ControllablePreCallEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;">user</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ControllableInjection</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;">user</span></div>
        <div style="display:flex;align-items:center;gap:9px;opacity:0.5;"><span style="width:6px;height:6px;border-radius:999px;border:1px solid var(--gray);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--gray);flex:1;">ObservableEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray);border:1px dashed #cfcfcf;border-radius:999px;padding:1px 7px;">internal</span></div>
        <div style="display:flex;align-items:center;gap:9px;opacity:0.5;"><span style="width:6px;height:6px;border-radius:999px;border:1px solid var(--gray);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--gray);flex:1;">ControllablePreCallEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray);border:1px dashed #cfcfcf;border-radius:999px;padding:1px 7px;">tools</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">RunEndEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;font-style:italic;">&lsaquo;scope&rsaquo;</span></div>
      </div>
    </div>

    <!-- gutter: the push -->
    <div style="flex:none;width:172px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;">
      <div style="width:100%;height:110px;position:relative;">
        <svg viewBox="0 0 172 110" preserveAspectRatio="xMidYMid meet" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;">
          <defs>
            <marker id="d4a" markerWidth="10" markerHeight="10" refX="7.6" refY="4.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L8.5,4.5 L0,9 Z" fill="#111111"></path></marker>
          </defs>
          <line x1="10" y1="40" x2="160" y2="40" stroke="#111111" stroke-width="2" marker-end="url(#d4a)"></line>
          <line x1="160" y1="78" x2="20" y2="78" stroke="#bdbdbd" stroke-width="1.3" stroke-dasharray="5 4"></line>
          <g stroke="#111111" stroke-width="1.6"><line x1="82" y1="70" x2="98" y2="86"></line><line x1="98" y1="70" x2="82" y2="86"></line></g>
        </svg>
      </div>
      <div style="text-align:center;margin-top:2px;">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink);line-height:1.3;">pushed at emit time</div>
        <div style="font-size:10px;color:var(--gray);line-height:1.3;">in-scope only</div>
      </div>
    </div>

    <!-- FilteredTrajectory (view) -->
    <div style="flex:0.82;box-sizing:border-box;border:1px solid var(--line);border-radius:6px;padding:14px 15px;background:var(--code-bg);">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px;">
        <span style="font-size:14px;font-weight:500;">FilteredTrajectory</span>
        <span style="font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray);">the view</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ObservableEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;background:var(--paper);">system_prompt</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ControllablePreCallEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;background:var(--paper);">user</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">ControllableInjection</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;background:var(--paper);">user</span></div>
        <div style="display:flex;align-items:center;gap:9px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--ink);flex:none;"></span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink);flex:1;">RunEndEvent</span><span style="font-family:var(--font-mono);font-size:9.5px;color:var(--gray-33);border:1px solid var(--line);border-radius:999px;padding:1px 7px;background:var(--paper);font-style:italic;">&lsaquo;scope&rsaquo;</span></div>
        <div style="margin-top:6px;padding-top:9px;border-top:1px dashed var(--line);font-size:10.5px;color:var(--gray);font-style:italic;line-height:1.4;">no back-reference to the parent (<span style="font-family:var(--font-mono);font-size:9.5px;font-style:normal;">__slots__</span>)</div>
      </div>
    </div>
  </div>

  <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;line-height:1.5;color:var(--gray);text-wrap:pretty;">Filtering happens once, at <span style="font-family:var(--font-mono);font-size:11px;color:var(--gray-33);">emit</span> time: the parent pushes each in-scope item into the view. The push is one-way, so an optimizer handed a <span style="font-family:var(--font-mono);font-size:11px;color:var(--gray-33);">FilteredTrajectory</span> has no path to the unfiltered data. A deliberate security boundary.</div>

</figure>
</div>
